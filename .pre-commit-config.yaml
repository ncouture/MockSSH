repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.11
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: ["Twisted>=25.5.0", "paramiko>=4.0.0", "cryptography>=46.0.0"]
        pass_filenames: false
        args: ["MockSSH.py"]
